<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wee Clash</title>
    <style>
        /* Загальні стилі */
        body {
            margin: 0;
            overflow: hidden; /* Ховаємо скролбари */
            font-family: Arial, sans-serif;
            color: gold; /* Основний колір тексту */
            background-color: black;
            display: flex; /* Для центрування контенту */
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Висота на весь екран */
            position: relative; /* Для позиціонування копірайту */
        }

        /* Приховуємо все, поки не завантажиться JS або не визначиться початковий стан */
        body > *:not(#intro-screen):not(#copyright-footer) {
            display: none;
        }

        /* Початковий екран */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/intro.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        /* Стилі для кастомної кнопки (якщо віджет не завантажиться) */
        #telegram-login-button-fallback {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #0088cc; /* Колір Telegram */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-top: 20px; /* Відступ від віджета */
            display: none; /* Приховано за замовчуванням */
        }

        #telegram-login-button-fallback:hover {
            background-color: #006699;
        }

        /* Стилі для повідомлення про помилку */
        #error-message {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            display: none; /* Приховано за замовчуванням */
            max-width: 80%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            border: 2px solid gold;
        }

        #error-message button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: gold;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        /* Копірайт знизу */
        #copyright-footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: gold;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            z-index: 101; /* Поверх всього */
            opacity: 0.8;
        }


        /* Відео екран */
        #video-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none; /* Приховано за замовчуванням */
            z-index: 90;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Відео на весь екран */
        }

        /* Основний інтерфейс гри */
        #game-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Приховано за замовчуванням */
            flex-direction: column;
            justify-content: space-between;
            background-color: #1a1a1a; /* Темний фон для гри */
            z-index: 80;
        }

        /* Верхня панель */
        #top-panel {
            width: 100%;
            height: 80px; /* Висота верхньої панелі */
            background-color: rgba(0, 0, 0, 0.8); /* Напівпрозорий чорний */
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            border-bottom: 2px solid gold; /* Золота рамка */
            justify-content: space-between;
        }

        #user-info {
            display: flex;
            align-items: center;
            color: gold;
            font-size: 1.2em;
        }

        #user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #333; /* Заглушка для аватара */
            margin-right: 10px;
            border: 2px solid gold;
            object-fit: cover;
        }

        #user-login {
            font-weight: bold;
        }

        #top-right-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #season-text {
            color: gold;
            font-size: 1.1em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }

        .top-menu-item {
            padding: 8px 12px;
            background-color: #333;
            border: 1px solid gold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .top-menu-item:hover {
            background-color: #555;
        }


        /* Основний контент гри */
        #main-content {
            flex-grow: 1; /* Займає весь доступний простір */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: gold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        /* Нижня панель меню (як Clash of Kings) */
        #bottom-panel {
            width: 100%;
            height: 100px; /* Висота нижньої панелі */
            background-color: rgba(0, 0, 0, 0.8); /* Напівпрозорий чорний */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
            border-top: 2px solid gold; /* Золота рамка */
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: gold;
            font-size: 0.9em;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px);
        }

        .menu-item img {
            width: 60px; /* Розмір іконок */
            height: 60px;
            margin-bottom: 5px;
            border: 1px solid rgba(255, 215, 0, 0.5); /* Золота рамка для іконок */
            border-radius: 5px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="error-message">
            <p>Віджет Telegram не завантажився.</p>
            <p>Будь ласка, перевірте підключення до Інтернету та налаштування домену бота в BotFather.</p>
            <button onclick="hideErrorMessage()">Гаразд</button>
        </div>
        <script async src="https://telegram.org/js/telegram-widget.js?19"
                data-telegram-login="Weegamemytestbot"
                data-size="large"
                data-onauth="onTelegramAuth(user)"
                data-request-access="write"></script>
        <button id="telegram-login-button-fallback">Увійти з Telegram</button>
    </div>

    <div id="video-screen">
        <video id="intro-video" muted playsinline>
            <source src="video/intro.mp4" type="video/mp4">
            Ваш браузер не підтримує тег video.
        </video>
    </div>

    <div id="game-interface">
        <div id="top-panel">
            <div id="user-info">
                <img id="user-avatar" src="https://via.placeholder.com/50/333/gold?text=А" alt="Аватар користувача">
                <span id="user-login">Гість</span>
            </div>
            <div id="top-right-section">
                <span id="season-text">SEASON 1</span>
                <div class="top-menu-item">Ресурси</div>
                <div class="top-menu-item">Налаштування</div>
            </div>
        </div>

        <div id="main-content">
            Ласкаво просимо до вашої гри!
        </div>

        <div id="bottom-panel">
            <div class="menu-item">
                <img src="https://via.placeholder.com/60/333/gold?text=База" alt="Іконка Бази">
                <span>База</span>
            </div>
            <div class="menu-item">
                <img src="https://via.placeholder.com/60/333/gold?text=Карта" alt="Іконка Карти">
                <span>Карта</span>
            </div>
            <div class="menu-item">
                <img src="https://via.placeholder.com/60/333/gold?text=Герої" alt="Іконка Героїв">
                <span>Герої</span>
            </div>
            <div class="menu-item">
                <img src="https://via.placeholder.com/60/333/gold?text=Альянс" alt="Іконка Альянсу">
                <span>Альянс</span>
            </div>
            <div class="menu-item">
                <img src="https://via.placeholder.com/60/333/gold?text=Пошта" alt="Іконка Пошти">
                <span>Пошта</span>
            </div>
        </div>
    </div>

    <div id="copyright-footer">
        © 2024 WEEBWE LLC. All rights reserved.
    </div>

    <audio id="background-music" loop>
        <source src="sound/Background.mp3" type="audio/mpeg">
        Ваш браузер не підтримує аудіо.
    </audio>

    <script>
        const introScreen = document.getElementById('intro-screen');
        const telegramLoginButtonFallback = document.getElementById('telegram-login-button-fallback');
        const errorMessage = document.getElementById('error-message');
        const videoScreen = document.getElementById('video-screen');
        const introVideo = document.getElementById('intro-video');
        const gameInterface = document.getElementById('game-interface');
        const backgroundMusic = document.getElementById('background-music');
        const userAvatar = document.getElementById('user-avatar');
        const userLogin = document.getElementById('user-login');

        // Функція для показу повідомлення про помилку
        function showErrorMessage() {
            errorMessage.style.display = 'block';
            telegramLoginButtonFallback.style.display = 'block'; // Показуємо кастомну кнопку, якщо віджет не працює
        }

        // Функція для приховування повідомлення про помилку
        function hideErrorMessage() {
            errorMessage.style.display = 'none';
        }

        // Перевірка завантаження віджета Telegram через певний час
        // Дає віджету шанс завантажитися і створити свою кнопку
        setTimeout(() => {
            const telegramWidget = document.querySelector('.telegram_login_button'); // Віджет Telegram створює елемент з цим класом
            if (!telegramWidget) {
                // Якщо віджет не знайдено (не завантажився)
                showErrorMessage();
                // Додаємо обробник для нашої запасної кнопки
                telegramLoginButtonFallback.onclick = () => {
                    alert('Віджет Telegram не завантажився. Будь ласка, перевірте підключення до Інтернету та налаштування домену бота в BotFather. Якщо ви тестуєте локально, це може не працювати.');
                    // Якщо ви тестуєте локально і віджет не працює, можете розкоментувати наступний рядок для симуляції авторизації:
                    // onTelegramAuth({ id: 12345, first_name: 'Тестовий', last_name: 'Юзер', username: 'testuser', photo_url: 'https://via.placeholder.com/50/gold/black?text=Т' });
                };
            } else {
                // Якщо віджет завантажився успішно, ховаємо нашу запасну кнопку
                telegramLoginButtonFallback.style.display = 'none';
            }
        }, 3000); // Чекаємо 3 секунди

        // Функція, яка викликається віджетом Telegram після успішної авторизації
        function onTelegramAuth(user) {
            console.log('Telegram User Info:', user);

            // Оновлюємо інформацію про користувача
            if (user.photo_url) {
                userAvatar.src = user.photo_url;
            }
            userLogin.textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            if (user.username) {
                userLogin.textContent += ` (@${user.username})`;
            }

            // Приховуємо початковий екран
            introScreen.style.display = 'none';

            // Показуємо екран з відео
            videoScreen.style.display = 'block';

            // Запускаємо фонову музику
            backgroundMusic.play().catch(error => {
                console.error('Помилка відтворення фонової музики:', error);
                // Попереджаємо користувача, якщо музика не може відтворитись автоматично
                alert('Музика не відтворилася автоматично. Будь ласка, взаємодійте зі сторінкою, щоб вона запрацювала.');
            });

            // Запускаємо вступне відео
            introVideo.play().catch(error => {
                console.error('Помилка відтворення відео:', error);
                // Якщо не вдалося відтворити відео, переходимо до гри одразу
                showGameInterface();
            });
        }

        // Обробник події закінчення відео
        introVideo.onended = () => {
            showGameInterface();
        };

        function showGameInterface() {
            videoScreen.style.display = 'none'; // Приховуємо відео екран
            gameInterface.style.display = 'flex'; // Показуємо інтерфейс гри
            // Переконайтесь, що музика продовжує грати
            backgroundMusic.play().catch(error => console.error('Помилка продовження музики:', error));
        }

    </script>
</body>
</html>
