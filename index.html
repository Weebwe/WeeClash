<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wee Clash</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            font-family: Arial, sans-serif;
            color: gold; /* Main text color */
            background-color: black;
            display: flex; /* For centering content */
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            position: relative; /* For copyright positioning */
        }

        /* Hide all content initially except for intro-screen and copyright-footer */
        body > *:not(#intro-screen):not(#copyright-footer) {
            display: none;
        }

        /* Intro Screen */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/intro.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center; /* Center content vertically too */
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        #intro-screen-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            height: 100%;
            width: 100%; /* Ensure it takes full width for centering child elements */
        }

        /* SEASON 1 on Intro Screen with Neon Style - positioned top-right */
        #intro-season-text {
            position: absolute;
            top: 10px; /* From top */
            right: 10px; /* From right */
            font-size: 1.0em; /* Smaller font for top-right */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFD700; /* Gold color for neon */
            text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px rgba(255, 215, 0, 0.7); /* Neon glow */
            animation: neon-glow 1.5s ease-in-out infinite alternate; /* Neon glow animation */
            white-space: nowrap; /* Prevent wrapping */
        }

        /* Keyframes for neon glow */
        @keyframes neon-glow {
            from {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px rgba(255, 215, 0, 0.7);
            }
            to {
                text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700, 0 0 30px rgba(255, 215, 0, 0.9);
            }
        }


        /* Login Buttons Container */
        #login-buttons-container {
            position: absolute;
            bottom: 60px; /* Adjust to be above copyright */
            left: 50%;
            transform: translateX(-50%);
            z-index: 105;
            display: flex;
            flex-direction: column; /* Stack buttons vertically */
            gap: 10px; /* Space between buttons */
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            box-sizing: border-box;
            align-items: center; /* Center buttons horizontally within container */
        }

        /* Style for the actual Telegram button generated by the widget */
        #telegram-widget-container {
            width: fit-content; /* Make container fit widget width */
        }
        #telegram-widget-container .telegram_login_button {
            display: block;
            margin: 0 auto;
        }

        /* Fallback button for Telegram login */
        #telegram-login-button-fallback {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: none; /* Hidden by default, shown if widget fails or not WebApp */
            width: fit-content;
        }

        #telegram-login-button-fallback:hover {
            background-color: #006699;
        }

        /* Error message for Telegram widget */
        #error-message {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            display: none;
            max-width: 80%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            border: 2px solid gold;
        }

        #error-message button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: gold;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        /* Copyright footer */
        #copyright-footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: gold;
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            z-index: 101;
            opacity: 0.8;
        }

        /* Video Screen */
        #video-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none;
            z-index: 90;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Main Game Interface */
        #game-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            background-color: #1a1a1a;
            z-index: 80;
        }

        /* Top Panel */
        #top-panel {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid gold;
            display: flex;
            flex-direction: column; /* Main container is column now */
            padding: 5px 0; /* Vertical padding */
            box-sizing: border-box;
        }

        #top-panel-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px; /* Horizontal padding for the row */
            box-sizing: border-box;
        }

        #top-panel-row-2 {
            display: flex;
            justify-content: center; /* Center player power */
            width: 100%;
            padding: 5px 10px 0; /* Padding below for spacing */
            box-sizing: border-box;
        }

        #user-profile-section {
            display: flex;
            align-items: center; /* Align avatar and VIP/login horizontally */
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            gap: 5px; /* Space between avatar and text block */
        }

        #user-avatar-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        #user-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #333;
            border: 2px solid gold;
            object-fit: cover;
            display: block;
        }

        #vip-level {
            position: absolute;
            top: -5px; /* Adjust to sit on top of the avatar border */
            left: 50%;
            transform: translateX(-50%); /* Center horizontally over avatar */
            background-color: #8B0000; /* Darker red for SVIP */
            color: white;
            font-size: 0.7em;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
            z-index: 5;
            white-space: nowrap;
            border: 1px solid gold; /* Small gold border */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }

        #user-info-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #user-login {
            font-weight: bold;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px; /* Limit width to prevent overflow */
            color: white; /* Make login text white */
        }

        #resources-container {
            display: flex;
            justify-content: center; /* Center resources within their section */
            gap: 8px; /* Space between resource items */
            flex-wrap: nowrap; /* Keep resources in one line */
            overflow-x: auto; /* Allow horizontal scrolling if too many resources */
            flex-grow: 1; /* Allow to take available space */
            padding: 0 5px; /* Small padding if it scrolls */
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background-color: #333; /* Darker background for resource items */
            padding: 3px 6px;
            border-radius: 5px;
            border: 1px solid gold; /* Gold border */
            font-size: 0.85em; /* Slightly larger font */
            white-space: nowrap;
            flex-shrink: 0; /* Prevent shrinking */
            color: #FFD700; /* Gold text for resource names */
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.3); /* Subtle glow */
        }

        .resource-item span {
            color: white; /* White for resource values */
        }

        .resource-item .emoji {
            font-size: 1.1em;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5)); /* Shadow for emoji */
        }

        #right-top-panel-items {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #diamonds-display {
            background-color: #000;
            border: 1px solid gold;
            padding: 5px 10px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
        #diamonds-display .emoji {
            font-size: 1.2em;
        }

        #player-power {
            font-size: 1.1em;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            padding: 5px 0; /* Vertical padding */
            background-color: rgba(51, 51, 51, 0.7); /* Background for power */
            border-radius: 5px;
            width: fit-content; /* Fit content */
            padding: 5px 15px; /* Internal padding */
            border: 1px solid gold;
        }

        /* Main Game Content */
        #main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: gold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Bottom Menu Panel */
        #bottom-panel {
            width: 100%;
            height: 90px;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
            box-sizing: border-box;
            border-top: 2px solid gold;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: gold;
            font-size: 0.8em;
            cursor: pointer;
            user-select: none;
            flex-grow: 1;
            padding: 5px 0;

            animation: menu-item-pulse 2s infinite alternate;
            transition: transform 0.4s ease-out, opacity 0.2s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
            position: relative; /* For badge positioning */
        }

        /* Menu Item Badge */
        .menu-item-badge {
            position: absolute;
            top: 0px; /* Adjust to sit slightly above the icon */
            right: calc(50% - 20px); /* Adjust to position relative to center of icon */
            transform: translateX(50%);
            background-color: red;
            color: white;
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px; /* More rounded */
            min-width: 15px; /* Ensure it's not too small */
            text-align: center;
            line-height: 1;
            z-index: 10;
            border: 1px solid white; /* Small border for visibility */
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.7);
            display: none; /* Hidden by default */
        }


        /* Hover/Active states for menu items */
        .menu-item:hover {
            transform: translateY(-5px) rotateY(15deg); /* Slight lift and flip on hover */
            opacity: 0.9;
        }
        .menu-item:active {
            transform: translateY(-2px) rotateY(5deg); /* Slight press down and smaller flip on active */
            opacity: 0.7;
        }

        /* Keyframes for menu item pulse animation */
        @keyframes menu-item-pulse {
            0% {
                text-shadow: 0 0 3px gold;
                filter: brightness(1);
            }
            100% {
                text-shadow: 0 0 8px gold, 0 0 12px rgba(255, 215, 0, 0.5);
                filter: brightness(1.2);
            }
        }


        .menu-item .emoji-icon {
            font-size: 40px;
            margin-bottom: 3px;
            line-height: 1;
        }

        /* Modal Window */
        #user-profile-modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 10px;
        }

        .modal-content {
            background-color: #1a1a1a;
            padding: 20px;
            border: 2px solid gold;
            border-radius: 10px;
            width: 95%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
            position: relative;
            color: gold;
            text-align: center;
            box-sizing: border-box;
        }

        .close-button {
            color: gold;
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-button:hover,
        .close-button:focus {
            color: #ccc;
            text-decoration: none;
            cursor: pointer;
        }

        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid gold;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .modal-user-info p {
            margin: 3px 0;
            font-size: 1.0em;
        }

        .modal-user-info strong {
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #top-panel-row-1 {
                padding: 0 5px;
            }
            #user-profile-section {
                gap: 3px;
            }
            #user-avatar-container {
                width: 40px;
                height: 40px;
            }
            #vip-level {
                font-size: 0.6em; /* Smaller VIP font on mobile */
                padding: 1px 4px;
                top: -3px;
            }
            #user-login {
                font-size: 0.8em;
                max-width: 70px;
            }
            #resources-container {
                gap: 5px; /* Adjust gap for smaller screens */
                padding: 0 3px;
            }
            .resource-item {
                font-size: 0.7em;
                padding: 2px 4px;
            }
            .resource-item .emoji {
                font-size: 1.0em;
            }
            #right-top-panel-items {
                gap: 5px;
            }
            #diamonds-display {
                font-size: 0.8em;
                padding: 3px 8px;
            }
            #diamonds-display .emoji {
                font-size: 1.0em;
            }

            #top-panel-row-2 {
                padding: 3px 5px 0;
            }
            #player-power {
                font-size: 0.9em;
                padding: 3px 10px;
            }

            #bottom-panel {
                height: 80px;
            }
            .menu-item {
                font-size: 0.75em;
            }
            .menu-item .emoji-icon {
                font-size: 35px;
            }
            .menu-item-badge {
                font-size: 0.6em;
                padding: 1px 4px;
                top: 0px;
                right: calc(50% - 15px); /* Adjusted for smaller icons */
            }
            #main-content {
                font-size: 1.2em;
            }
            .modal-content {
                padding: 15px;
            }
            #login-buttons-container {
                bottom: 40px;
                gap: 8px;
            }
            #telegram-login-button-fallback {
                font-size: 20px;
                padding: 12px 25px;
            }
            #intro-season-text {
                font-size: 0.8em;
                top: 5px;
                right: 5px;
            }
        }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="intro-screen-content">
            <span id="intro-season-text">SEASON 1</span>
            <div id="error-message">
                <p>Telegram widget failed to load.</p>
                <p>Please check your internet connection and bot domain settings in BotFather.</p>
                <button id="error-ok-button" onclick="hideErrorMessage()">OK</button>
            </div>
            <div id="login-buttons-container">
                <div id="telegram-widget-container">
                    <script async src="https://telegram.org/js/telegram-widget.js?19"
                            data-telegram-login="Weegamemytestbot"
                            data-size="large"
                            data-onauth="onTelegramAuth(user)"
                            data-request-access="write"></script>
                    <button id="telegram-login-button-fallback">Log in with Telegram</button>
                </div>
            </div>
        </div>
    </div>

    <div id="copyright-footer">
        © 2024 WEEBWE LLC. All rights reserved.
    </div>

    <div id="video-screen">
        <video id="intro-video" playsinline>
            <source src="video/intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="game-interface">
        <div id="top-panel">
            <div id="top-panel-row-1">
                <div id="user-profile-section">
                    <div id="user-avatar-container">
                        <img id="user-avatar" src="https://via.placeholder.com/50/333/gold?text=A" alt="User Avatar">
