<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wee Clash</title>
  <style>
    :root {
      --main-blue: #0094FE;
      --main-gold: #FFD700;
      --dark-bg: #1a1a1a;
    }

    body {
      margin: 0;
      background-color: black;
      font-family: Arial, sans-serif;
      color: var(--main-blue);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #intro-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('img/intro.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #intro-season-text {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 1em;
      font-weight: bold;
      text-transform: uppercase;
      color: var(--main-gold);
      text-shadow: 0 0 8px var(--main-gold);
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px var(--main-gold); }
      to   { text-shadow: 0 0 15px var(--main-gold); }
    }

    #login-buttons-container {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 20px var(--main-blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #telegram-login-button-fallback {
      padding: 10px 25px;
      font-size: 18px;
      background: var(--main-blue);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    #telegram-login-button-fallback:hover {
      background-color: #0078c9;
    }

    #copyright-footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.8em;
      color: var(--main-blue);
      opacity: 0.6;
    }

    #video-screen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      z-index: 90;
    }

    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #game-interface {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('img/castle_bg.jpg') center/cover no-repeat;
      flex-direction: column;
      justify-content: space-between;
    }

    #top-panel {
      background: rgba(0, 0, 0, 0.7);
      border-bottom: 2px solid var(--main-blue);
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    #user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--main-gold);
    }

    #vip-level {
      background: #8B0000;
      color: white;
      font-size: 0.75em;
      padding: 2px 5px;
      border-radius: 4px;
      border: 1px solid var(--main-gold);
      margin-top: 5px;
      text-align: center;
    }

    .resource-item {
      background: rgba(0, 0, 0, 0.4);
      padding: 5px 10px;
      border-radius: 5px;
      color: var(--main-gold);
      border: 1px solid var(--main-blue);
      margin: 0 3px;
      font-size: 0.9em;
    }

    #player-power {
      background: rgba(0, 0, 0, 0.6);
      padding: 5px 15px;
      border-radius: 8px;
      font-weight: bold;
      color: white;
      border: 1px solid var(--main-blue);
    }

    #main-content {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.4em;
      color: var(--main-blue);
    }

    #bottom-panel {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(0, 0, 0, 0.85);
      height: 80px;
      border-top: 2px solid var(--main-blue);
    }

    .menu-item {
      background: var(--main-blue);
      color: white;
      border-radius: 8px;
      padding: 6px;
      font-size: 0.8em;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid white;
      width: 60px;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-blue);
    }

    .menu-item:hover {
      background: #0078c9;
    }

    .emoji-icon {
      font-size: 24px;
    }

    @media(max-width: 600px) {
      .menu-item {
        width: 50px;
        font-size: 0.7em;
      }
    }
  </style>
</head>
<body>

  <div id="intro-screen">
    <div id="intro-season-text">SEASON 1</div>
    <div id="login-buttons-container">
      <div id="telegram-widget-container"></div>
      <button id="telegram-login-button-fallback">Log in with Telegram</button>
    </div>
  </div>

  <div id="copyright-footer">© 2024 WEEBWE LLC. All rights reserved.</div>

  <div id="video-screen">
    <video id="intro-video" playsinline>
      <source src="video/intro.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div id="game-interface">
    <div id="top-panel">
      <div>
        <img id="user-avatar" src="https://via.placeholder.com/50/333/gold?text=A" />
        <div id="vip-level">VIP 5</div>
      </div>
      <div style="display: flex;">
        <div class="resource-item">🍎 <span id="resource-food">100</span></div>
        <div class="resource-item">🌳 <span id="resource-wood">100</span></div>
        <div class="resource-item">🪨 <span id="resource-stone">100</span></div>
        <div class="resource-item">💰 <span id="resource-gold">100</span></div>
        <div class="resource-item">💎 <span id="resource-diamonds">100</span></div>
      </div>
      <div id="player-power">Power: 999K</div>
    </div>

    <div id="main-content">Welcome to Wee Clash</div>

    <div id="bottom-panel">
      <div class="menu-item"><div class="emoji-icon">🗺️</div>Map</div>
      <div class="menu-item"><div class="emoji-icon">📜</div>Quests</div>
      <div class="menu-item"><div class="emoji-icon">📦</div>Items</div>
      <div class="menu-item"><div class="emoji-icon">✉️</div>Mail</div>
      <div class="menu-item"><div class="emoji-icon">🛡️</div>Alliance</div>
    </div>
  </div>

  <audio id="background-music" loop>
    <source src="saund/background.mp3" type="audio/mpeg" />
  </audio>
  <audio id="click-sound">
    <source src="saund/click.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const introScreen = document.getElementById('intro-screen');
    const gameInterface = document.getElementById('game-interface');
    const videoScreen = document.getElementById('video-screen');
    const introVideo = document.getElementById('intro-video');
    const backgroundMusic = document.getElementById('background-music');

    function tryPlayMedia() {
      backgroundMusic.play().catch(() => {});
      introVideo.play().catch(() => {});
    }

    function showVideoScreen() {
      introScreen.style.display = 'none';
      videoScreen.style.display = 'block';
      tryPlayMedia();
    }

    introVideo.onended = () => {
      videoScreen.style.display = 'none';
      gameInterface.style.display = 'flex';
    };

    // For demo: auto login after 2s
    setTimeout(showVideoScreen, 2000);
  </script>
</body>
</html>
